<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Screener">
<title>MARKET SCREENER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

:root {
–bg: #080c10;
–panel: #0d1117;
–border: #1e2d3d;
–green: #00ff88;
–red: #ff3355;
–yellow: #ffd700;
–blue: #00aaff;
–dim: #4a5568;
–text: #c9d1d9;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
min-height: 100vh;
padding-bottom: 40px;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
pointer-events: none;
z-index: 999;
}

.header {
padding: 14px 16px 10px;
border-bottom: 1px solid var(–border);
background: var(–panel);
position: sticky;
top: 0;
z-index: 100;
display: flex;
justify-content: space-between;
align-items: center;
}

.title {
font-family: ‘Rajdhani’, sans-serif;
font-weight: 700;
font-size: 17px;
letter-spacing: 4px;
color: var(–green);
text-shadow: 0 0 12px rgba(0,255,136,0.5);
}

.subtitle { font-size: 10px; color: var(–dim); letter-spacing: 1px; margin-top: 3px; }

.btns { display: flex; gap: 6px; }

.btn {
padding: 7px 13px;
border-radius: 3px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
cursor: pointer;
letter-spacing: 1px;
border: 1px solid var(–border);
background: transparent;
color: var(–dim);
transition: all 0.15s;
}

.btn:active { transform: scale(0.95); }
.btn-scan { border-color: var(–blue); color: var(–blue); background: rgba(0,170,255,0.08); }
.btn-auto { }
.btn-auto.on { border-color: var(–green); color: var(–green); background: rgba(0,255,136,0.08); }

.progress {
height: 2px;
background: var(–border);
}

.progress-inner {
height: 100%;
width: 0%;
background: var(–blue);
box-shadow: 0 0 6px rgba(0,170,255,0.7);
transition: width 0.3s ease;
}

.section { margin: 10px 16px 0; }

.stats {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 8px;
}

.stat {
padding: 10px 6px;
background: var(–panel);
border: 1px solid var(–border);
border-radius: 5px;
text-align: center;
}

.stat-l { font-size: 9px; color: var(–dim); letter-spacing: 2px; margin-bottom: 4px; }
.stat-v { font-family: ‘Rajdhani’, sans-serif; font-weight: 700; font-size: 20px; }

.sent-wrap {
padding: 10px 14px;
background: var(–panel);
border: 1px solid var(–border);
border-radius: 5px;
}

.sent-title { font-size: 9px; color: var(–dim); letter-spacing: 3px; margin-bottom: 8px; }
.sent-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; }
.sl { background: var(–green); opacity: 0.75; transition: flex 0.5s; }
.sn { background: var(–dim); opacity: 0.4; transition: flex 0.5s; }
.ss { background: var(–red); opacity: 0.75; transition: flex 0.5s; }
.sent-pcts { display: flex; justify-content: space-between; margin-top: 5px; font-size: 10px; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }

.fb {
padding: 5px 12px;
border-radius: 3px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
cursor: pointer;
border: 1px solid var(–border);
background: transparent;
color: var(–dim);
letter-spacing: 1px;
}

.fb.fa { border-color: var(–blue); color: var(–blue); background: rgba(0,170,255,0.08); }
.fb.fl { border-color: var(–green); color: var(–green); background: rgba(0,255,136,0.08); }
.fb.fs { border-color: var(–red); color: var(–red); background: rgba(255,51,85,0.08); }
.fb.fn { border-color: var(–dim); color: var(–text); background: rgba(255,255,255,0.04); }

.sorts { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.sort-lbl { font-size: 9px; color: var(–dim); letter-spacing: 1px; }

.sb {
padding: 4px 9px;
border-radius: 3px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
cursor: pointer;
border: 1px solid var(–border);
background: transparent;
color: var(–dim);
}

.sb.sa { border-color: var(–yellow); color: var(–yellow); background: rgba(255,215,0,0.06); }

.list { padding: 10px 16px 20px; }

.card {
margin-bottom: 8px;
padding: 12px 14px;
background: var(–panel);
border: 1px solid var(–border);
border-radius: 6px;
}

.card.hl { border-color: rgba(0,255,136,0.35); box-shadow: 0 0 10px rgba(0,255,136,0.07); }
.card.hs { border-color: rgba(255,51,85,0.35); box-shadow: 0 0 10px rgba(255,51,85,0.07); }

.ct { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.cn { display: flex; align-items: center; gap: 8px; }
.cname { font-family: ‘Rajdhani’, sans-serif; font-weight: 700; font-size: 17px; }
.csym { font-size: 10px; color: var(–dim); }
.cr { display: flex; align-items: center; gap: 8px; }
.cscore { font-family: ‘Rajdhani’, sans-serif; font-weight: 700; font-size: 20px; }

.badge {
padding: 2px 10px;
border-radius: 2px;
font-family: ‘Rajdhani’, sans-serif;
font-weight: 700;
font-size: 11px;
letter-spacing: 2px;
border: 1px solid;
}

.bl { color: var(–green); border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.08); }
.bs { color: var(–red); border-color: rgba(255,51,85,0.4); background: rgba(255,51,85,0.08); }
.bn { color: var(–dim); border-color: var(–border); }

.cstats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.csl { font-size: 9px; color: var(–dim); letter-spacing: 1px; margin-bottom: 2px; }
.csv { font-family: ‘Rajdhani’, sans-serif; font-weight: 600; font-size: 14px; }

.tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.tag { font-size: 9px; padding: 2px 7px; background: rgba(255,255,255,0.03); border: 1px solid var(–border); border-radius: 2px; color: var(–dim); letter-spacing: 1px; }

.bar-track { height: 3px; background: #1a2332; border-radius: 2px; }
.bar-fill { height: 100%; border-radius: 2px; opacity: 0.6; }

.error {
margin: 10px 16px 0;
padding: 12px 14px;
background: rgba(255,51,85,0.08);
border: 1px solid var(–red);
border-radius: 5px;
font-size: 11px;
color: var(–red);
line-height: 1.6;
display: none;
}

.empty {
text-align: center;
padding: 60px 20px;
color: var(–dim);
font-size: 11px;
letter-spacing: 2px;
line-height: 2.2;
}
</style>

</head>
<body>

<div class="header">
  <div>
    <div class="title">▶ SCREENER</div>
    <div class="subtitle" id="sub">TAP SCAN TO BEGIN</div>
  </div>
  <div class="btns">
    <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">○ AUTO</button>
    <button class="btn btn-scan" id="scanBtn" onclick="startScan()">⟳ SCAN</button>
  </div>
</div>

<div class="progress"><div class="progress-inner" id="prog"></div></div>

<div class="error" id="err"></div>

<div id="statsWrap" style="display:none">
  <div class="section">
    <div class="stats">
      <div class="stat"><div class="stat-l">SCANNED</div><div class="stat-v" id="sTotal" style="color:var(--text)">0</div></div>
      <div class="stat"><div class="stat-l">▲ LONG</div><div class="stat-v" id="sLong" style="color:var(--green)">0</div></div>
      <div class="stat"><div class="stat-l">▼ SHORT</div><div class="stat-v" id="sShort" style="color:var(--red)">0</div></div>
      <div class="stat"><div class="stat-l">TOP PICK</div><div class="stat-v" id="sTop" style="color:var(--yellow);font-size:12px">—</div></div>
    </div>
  </div>
  <div class="section">
    <div class="sent-wrap">
      <div class="sent-title">▸ MARKET SENTIMENT</div>
      <div class="sent-bar">
        <div class="sl" id="sentL"></div>
        <div class="sn" id="sentN"></div>
        <div class="ss" id="sentS"></div>
      </div>
      <div class="sent-pcts">
        <span style="color:var(--green)" id="pctL">0% LONG</span>
        <span style="color:var(--red)" id="pctS">0% SHORT</span>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:10px">
  <div class="filters">
    <button class="fb fa" id="fAll" onclick="setF('ALL')">ALL</button>
    <button class="fb" id="fLong" onclick="setF('LONG')">▲ LONG</button>
    <button class="fb" id="fShort" onclick="setF('SHORT')">▼ SHORT</button>
    <button class="fb" id="fNeutral" onclick="setF('NEUTRAL')">— SKIP</button>
  </div>
</div>

<div class="section" style="margin-top:6px">
  <div class="sorts">
    <span class="sort-lbl">SORT:</span>
    <button class="sb sa" id="sScore" onclick="setS('score')">SCORE</button>
    <button class="sb" id="sRsiL" onclick="setS('rsiL')">RSI↓</button>
    <button class="sb" id="sRsiH" onclick="setS('rsiH')">RSI↑</button>
    <button class="sb" id="sDrop" onclick="setS('drop')">DROP%</button>
    <button class="sb" id="sPump" onclick="setS('pump')">PUMP%</button>
  </div>
</div>

<div class="list" id="list">
  <div class="empty">TAP ⟳ SCAN TO BEGIN<br><span style="font-size:10px">Scans 20 coins via Binance<br>Takes ~20 seconds</span></div>
</div>

<script>
const COINS = [
  {sym:"BTC",name:"Bitcoin",bin:"BTCUSDT"},
  {sym:"ETH",name:"Ethereum",bin:"ETHUSDT"},
  {sym:"XRP",name:"XRP",bin:"XRPUSDT"},
  {sym:"SOL",name:"Solana",bin:"SOLUSDT"},
  {sym:"BNB",name:"BNB",bin:"BNBUSDT"},
  {sym:"DOGE",name:"Dogecoin",bin:"DOGEUSDT"},
  {sym:"ADA",name:"Cardano",bin:"ADAUSDT"},
  {sym:"TON",name:"TON",bin:"TONUSDT"},
  {sym:"LINK",name:"Chainlink",bin:"LINKUSDT"},
  {sym:"AVAX",name:"Avalanche",bin:"AVAXUSDT"},
  {sym:"DOT",name:"Polkadot",bin:"DOTUSDT"},
  {sym:"NEAR",name:"NEAR",bin:"NEARUSDT"},
  {sym:"UNI",name:"Uniswap",bin:"UNIUSDT"},
  {sym:"ATOM",name:"Cosmos",bin:"ATOMUSDT"},
  {sym:"LTC",name:"Litecoin",bin:"LTCUSDT"},
  {sym:"TRX",name:"TRON",bin:"TRXUSDT"},
  {sym:"APT",name:"Aptos",bin:"APTUSDT"},
  {sym:"ARB",name:"Arbitrum",bin:"ARBUSDT"},
  {sym:"OP",name:"Optimism",bin:"OPUSDT"},
  {sym:"INJ",name:"Injective",bin:"INJUSDT"},
];

let results=[], filt='ALL', sort='score', autoOn=false, autoTimer=null, scanning=false;

function rsi(closes,p=14){
  if(closes.length<p+1)return 50;
  const r=closes.slice(-(p+1));
  let g=0,l=0;
  for(let i=1;i<r.length;i++){const d=r[i]-r[i-1];d>0?g+=d:l+=Math.abs(d);}
  const ag=g/p,al=l/p;
  if(!al)return 100;
  return Math.round(100-100/(1+ag/al));
}

function score({ch,rsi:r,maStack,pVsMA}){
  let ls=0,ss=0,reasons=[];
  if(r<=25){ls+=3.5;reasons.push("RSI very oversold");}
  else if(r<=35){ls+=2.5;reasons.push("RSI oversold");}
  else if(r<=45){ls+=1;reasons.push("RSI low");}
  else if(r>=75){ss+=3.5;reasons.push("RSI very overbought");}
  else if(r>=65){ss+=2.5;reasons.push("RSI overbought");}
  else if(r>=55){ss+=1;reasons.push("RSI high");}

  if(maStack==='bull'){ls+=2;reasons.push("MAs bullish");}
  else if(maStack==='bear'){ss+=2;reasons.push("MAs bearish");}
  else reasons.push("MAs flat");

  if(pVsMA==='above'){ls+=1.5;reasons.push("Above MAs");}
  else if(pVsMA==='below'){ss+=1.5;reasons.push("Below MAs");}

  if(ch<=-5){ls+=2;reasons.push("Big drop today");}
  else if(ch<=-3){ls+=1;reasons.push("Down on day");}
  else if(ch>=8){ss+=2;reasons.push("Big pump today");}
  else if(ch>=5){ss+=1;reasons.push("Up on day");}

  const max=9;
  if(ls>ss)return{score:Math.min(Math.round((ls/max)*10),10),bias:'LONG',reasons};
  if(ss>ls)return{score:Math.min(Math.round((ss/max)*10),10),bias:'SHORT',reasons};
  return{score:Math.round(ls),bias:'NEUTRAL',reasons};
}

function setProg(p){document.getElementById('prog').style.width=p+'%';}

async function startScan(){
  if(scanning)return;
  scanning=true;
  document.getElementById('err').style.display='none';
  document.getElementById('scanBtn').textContent='0%';
  document.getElementById('scanBtn').style.opacity='0.5';
  setProg(5);

  try{
    // Fetch all tickers in one call from Binance
    const tickRes = await fetch('https://api.binance.com/api/v3/ticker/24hr');
    if(!tickRes.ok) throw new Error('Binance unavailable');
    const allTickers = await tickRes.json();
    setProg(20);
    document.getElementById('scanBtn').textContent='20%';

    const processed=[];

    for(let i=0;i<COINS.length;i++){
      const coin=COINS[i];
      const ticker=allTickers.find(t=>t.symbol===coin.bin);
      if(!ticker)continue;

      const price=parseFloat(ticker.lastPrice);
      const ch=parseFloat(ticker.priceChangePercent);

      try{
        // Get 1h klines from Binance
        const kRes=await fetch(`https://api.binance.com/api/v3/klines?symbol=${coin.bin}&interval=1h&limit=25`);
        const klines=await kRes.json();

        let maStack='flat',pVsMA='neutral',r=50,ma5,ma10,ma20;

        if(Array.isArray(klines)&&klines.length>=20){
          const closes=klines.map(k=>parseFloat(k[4]));
          ma5=closes.slice(-5).reduce((a,b)=>a+b,0)/5;
          ma10=closes.slice(-10).reduce((a,b)=>a+b,0)/10;
          ma20=closes.slice(-20).reduce((a,b)=>a+b,0)/20;
          maStack=ma5>ma10&&ma10>ma20?'bull':ma5<ma10&&ma10<ma20?'bear':'flat';
          pVsMA=price>ma5&&price>ma10&&price>ma20?'above':price<ma5&&price<ma10&&price<ma20?'below':'neutral';
          r=rsi(closes);
        }

        const s=score({ch,rsi:r,maStack,pVsMA});
        processed.push({...coin,price,ch,rsi:r,maStack,pVsMA,ma5,ma10,ma20,...s});
      }catch(e){
        const s=score({ch,rsi:50,maStack:'flat',pVsMA:'neutral'});
        processed.push({...coin,price,ch,rsi:50,maStack:'flat',pVsMA:'neutral',...s});
      }

      const p=20+Math.round(((i+1)/COINS.length)*75);
      setProg(p);
      document.getElementById('scanBtn').textContent=p+'%';
      await new Promise(r=>setTimeout(r,80));
    }

    processed.sort((a,b)=>b.score-a.score);
    results=processed;

    const now=new Date().toLocaleTimeString('en-AU',{hour12:false});
    document.getElementById('sub').textContent=`LAST SCAN: ${now}`;
    updateStats();
    render();
    setProg(100);
    setTimeout(()=>setProg(0),600);

  }catch(e){
    const el=document.getElementById('err');
    el.textContent='⚠️ '+(e.message||'Scan failed. Check connection.');
    el.style.display='block';
    setProg(0);
  }

  document.getElementById('scanBtn').textContent='⟳ SCAN';
  document.getElementById('scanBtn').style.opacity='1';
  scanning=false;
}

function updateStats(){
  const l=results.filter(c=>c.bias==='LONG').length;
  const s=results.filter(c=>c.bias==='SHORT').length;
  const n=results.filter(c=>c.bias==='NEUTRAL').length;
  const t=results.length;
  const top=results[0];

  document.getElementById('sTotal').textContent=t;
  document.getElementById('sLong').textContent=l;
  document.getElementById('sShort').textContent=s;
  document.getElementById('sTop').textContent=top?`${top.sym} ${top.score}/10`:'—';
  document.getElementById('statsWrap').style.display='block';

  document.getElementById('sentL').style.flex=l||0.1;
  document.getElementById('sentN').style.flex=n||0.1;
  document.getElementById('sentS').style.flex=s||0.1;
  document.getElementById('pctL').textContent=`▲ ${Math.round((l/t)*100)}% LONG`;
  document.getElementById('pctS').textContent=`▼ ${Math.round((s/t)*100)}% SHORT`;
}

function sc(s){return s>=7?'var(--green)':s>=5?'var(--yellow)':'var(--red)';}
function rc(r){return r>=70?'var(--red)':r<=30?'var(--green)':r>=60?'var(--yellow)':r<=40?'var(--blue)':'var(--text)';}
function dp(p){return p>=1000?1:p>=1?3:4;}

function render(){
  let list=[...results].filter(c=>filt==='ALL'||c.bias===filt);
  list.sort((a,b)=>{
    if(sort==='score')return b.score-a.score;
    if(sort==='rsiL')return a.rsi-b.rsi;
    if(sort==='rsiH')return b.rsi-a.rsi;
    if(sort==='drop')return a.ch-b.ch;
    if(sort==='pump')return b.ch-a.ch;
    return 0;
  });

  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div class="empty">NO COINS MATCH FILTER</div>';return;}

  el.innerHTML=list.map(c=>{
    const bc=c.bias==='LONG'?'bl':c.bias==='SHORT'?'bs':'bn';
    const bt=c.bias==='LONG'?'▲ LONG':c.bias==='SHORT'?'▼ SHORT':'— SKIP';
    const cc=c.score>=7?(c.bias==='LONG'?'hl':c.bias==='SHORT'?'hs':''):'';
    const mat=c.maStack==='bull'?'▲ BULL':c.maStack==='bear'?'▼ BEAR':'~ FLAT';
    const mac=c.maStack==='bull'?'var(--green)':c.maStack==='bear'?'var(--red)':'var(--yellow)';
    return`<div class="card ${cc}">
      <div class="ct">
        <div class="cn"><div class="cname">${c.name}</div><div class="csym">${c.sym}</div></div>
        <div class="cr">
          <div class="cscore" style="color:${sc(c.score)}">${c.score}/10</div>
          <div class="badge ${bc}">${bt}</div>
        </div>
      </div>
      <div class="cstats">
        <div><div class="csl">PRICE</div><div class="csv">$${c.price?.toFixed(dp(c.price))}</div></div>
        <div><div class="csl">24H</div><div class="csv" style="color:${c.ch>=0?'var(--green)':'var(--red)'}">${c.ch>=0?'+':''}${c.ch?.toFixed(2)}%</div></div>
        <div><div class="csl">RSI</div><div class="csv" style="color:${rc(c.rsi)}">${c.rsi}</div></div>
        <div><div class="csl">MAs</div><div class="csv" style="color:${mac};font-size:11px">${mat}</div></div>
      </div>
      ${c.reasons?.length?`<div class="tags">${c.reasons.map(r=>`<div class="tag">${r}</div>`).join('')}</div>`:''}
      <div class="bar-track"><div class="bar-fill" style="width:${c.score*10}%;background:${sc(c.score)}"></div></div>
    </div>`;
  }).join('');
}

function setF(f){
  filt=f;
  document.querySelectorAll('.fb').forEach(b=>b.className='fb');
  const map={ALL:'fb fa',LONG:'fb fl',SHORT:'fb fs',NEUTRAL:'fb fn'};
  const ids={ALL:'fAll',LONG:'fLong',SHORT:'fShort',NEUTRAL:'fNeutral'};
  document.getElementById(ids[f]).className=map[f];
  if(results.length)render();
}

function setS(s){
  sort=s;
  document.querySelectorAll('.sb').forEach(b=>b.className='sb');
  const ids={score:'sScore',rsiL:'sRsiL',rsiH:'sRsiH',drop:'sDrop',pump:'sPump'};
  document.getElementById(ids[s]).className='sb sa';
  if(results.length)render();
}

function toggleAuto(){
  autoOn=!autoOn;
  const b=document.getElementById('autoBtn');
  if(autoOn){b.textContent='● AUTO';b.classList.add('on');autoTimer=setInterval(startScan,60000);}
  else{b.textContent='○ AUTO';b.classList.remove('on');clearInterval(autoTimer);}
}
</script>

</body>
</html>
