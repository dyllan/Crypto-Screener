<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MARKET SCREENER — High Roller Trading</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg: #080c10;
    --panel: #0d1117;
    --border: #1e2d3d;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd700;
    --blue: #00aaff;
    --dim: #4a5568;
    --text: #c9d1d9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  .header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 12px rgba(0,255,136,0.5);
  }

  .subtitle { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-top: 2px; }

  .header-btns { display: flex; gap: 6px; }

  .btn {
    padding: 6px 12px;
    border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
  }

  .btn:active { transform: scale(0.96); }

  .btn-scan {
    border-color: var(--blue);
    color: var(--blue);
    background: rgba(0,170,255,0.08);
  }

  .btn-auto.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,136,0.08);
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    display: none;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 1px;
    transition: width 0.4s;
    box-shadow: 0 0 6px rgba(0,170,255,0.6);
    width: 0%;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
    margin: 10px 16px 0;
  }

  .stat-card {
    padding: 10px 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    text-align: center;
  }

  .stat-label { font-size: 9px; color: var(--dim); letter-spacing: 2px; margin-bottom: 4px; }
  .stat-value { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; }

  .sentiment-bar-wrap {
    margin: 10px 16px 0;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
  }

  .sentiment-label { font-size: 9px; color: var(--dim); letter-spacing: 3px; margin-bottom: 8px; }

  .sentiment-bar {
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }

  .sentiment-long { background: var(--green); opacity: 0.7; transition: flex 0.6s; }
  .sentiment-neutral { background: var(--dim); opacity: 0.4; transition: flex 0.6s; }
  .sentiment-short { background: var(--red); opacity: 0.7; transition: flex 0.6s; }

  .sentiment-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 10px;
  }

  .filters {
    margin: 10px 16px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .filter-btn.active-long { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.08); }
  .filter-btn.active-short { border-color: var(--red); color: var(--red); background: rgba(255,51,85,0.08); }
  .filter-btn.active-all { border-color: var(--blue); color: var(--blue); background: rgba(0,170,255,0.08); }
  .filter-btn.active-neutral { border-color: var(--dim); color: var(--text); background: rgba(255,255,255,0.05); }

  .sort-row {
    margin: 6px 16px 0;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .sort-label { font-size: 9px; color: var(--dim); letter-spacing: 1px; }

  .sort-btn {
    padding: 4px 9px;
    border-radius: 3px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    transition: all 0.15s;
  }

  .sort-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,0,0.06); }

  .coins-list { padding: 10px 16px 40px; }

  .coin-card {
    margin-bottom: 8px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 0.3s;
  }

  .coin-card.high-long { border-color: rgba(0,255,136,0.4); box-shadow: 0 0 10px rgba(0,255,136,0.08); }
  .coin-card.high-short { border-color: rgba(255,51,85,0.4); box-shadow: 0 0 10px rgba(255,51,85,0.08); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .coin-name-wrap { display: flex; align-items: center; gap: 8px; }
  .coin-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 17px; }
  .coin-sym { font-size: 10px; color: var(--dim); }

  .card-right { display: flex; align-items: center; gap: 8px; }

  .score-val { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; }

  .bias-badge {
    padding: 2px 10px;
    border-radius: 2px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    border: 1px solid;
  }

  .bias-long { color: var(--green); border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.08); }
  .bias-short { color: var(--red); border-color: rgba(255,51,85,0.4); background: rgba(255,51,85,0.08); }
  .bias-neutral { color: var(--dim); border-color: var(--border); background: transparent; }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }

  .stat-mini-label { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-bottom: 2px; }
  .stat-mini-val { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; }

  .reasons { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }

  .reason-tag {
    font-size: 9px;
    padding: 2px 7px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .score-bar-track { height: 3px; background: #1a2332; border-radius: 2px; }
  .score-bar-fill { height: 100%; border-radius: 2px; opacity: 0.6; transition: width 0.6s; }

  .error-box {
    margin: 10px 16px 0;
    padding: 12px 14px;
    background: rgba(255,51,85,0.08);
    border: 1px solid var(--red);
    border-radius: 5px;
    font-size: 11px;
    color: var(--red);
    line-height: 1.6;
    display: none;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 2px;
    line-height: 2;
    display: none;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">▶ MARKET SCREENER</div>
    <div class="subtitle" id="subtitle">READY TO SCAN</div>
  </div>
  <div class="header-btns">
    <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">○ AUTO</button>
    <button class="btn btn-scan" id="scanBtn" onclick="runScan()">⟳ SCAN</button>
  </div>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="stats-grid" id="statsGrid" style="display:none">
  <div class="stat-card">
    <div class="stat-label">SCANNED</div>
    <div class="stat-value" id="statTotal" style="color:var(--text)">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">▲ LONG</div>
    <div class="stat-value" id="statLong" style="color:var(--green)">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">▼ SHORT</div>
    <div class="stat-value" id="statShort" style="color:var(--red)">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">TOP PICK</div>
    <div class="stat-value" id="statTop" style="color:var(--yellow); font-size:13px">—</div>
  </div>
</div>

<div class="sentiment-bar-wrap" id="sentimentWrap" style="display:none">
  <div class="sentiment-label">▸ MARKET SENTIMENT</div>
  <div class="sentiment-bar">
    <div class="sentiment-long" id="sentLong"></div>
    <div class="sentiment-neutral" id="sentNeutral"></div>
    <div class="sentiment-short" id="sentShort"></div>
  </div>
  <div class="sentiment-labels">
    <span style="color:var(--green)" id="sentLongPct">0% LONG</span>
    <span style="color:var(--red)" id="sentShortPct">0% SHORT</span>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active-all" id="fAll" onclick="setFilter('ALL')">ALL</button>
  <button class="filter-btn" id="fLong" onclick="setFilter('LONG')">▲ LONG</button>
  <button class="filter-btn" id="fShort" onclick="setFilter('SHORT')">▼ SHORT</button>
  <button class="filter-btn" id="fNeutral" onclick="setFilter('NEUTRAL')">— SKIP</button>
</div>

<div class="sort-row">
  <span class="sort-label">SORT:</span>
  <button class="sort-btn active" id="sScore" onclick="setSort('score')">SCORE</button>
  <button class="sort-btn" id="sRsiLow" onclick="setSort('rsi_low')">RSI↓</button>
  <button class="sort-btn" id="sRsiHigh" onclick="setSort('rsi_high')">RSI↑</button>
  <button class="sort-btn" id="sDrop" onclick="setSort('drop')">DROP%</button>
  <button class="sort-btn" id="sPump" onclick="setSort('pump')">PUMP%</button>
</div>

<div class="empty-state" id="emptyState">
  TAP ⟳ SCAN TO BEGIN<br>
  <span style="font-size:10px">Scans 20 coins via CoinGecko<br>Takes ~60 seconds</span>
</div>

<div class="coins-list" id="coinsList"></div>

<script>
const COINS = [
  {id:"bitcoin",sym:"BTC",name:"Bitcoin"},
  {id:"ethereum",sym:"ETH",name:"Ethereum"},
  {id:"ripple",sym:"XRP",name:"XRP"},
  {id:"solana",sym:"SOL",name:"Solana"},
  {id:"binancecoin",sym:"BNB",name:"BNB"},
  {id:"dogecoin",sym:"DOGE",name:"Dogecoin"},
  {id:"cardano",sym:"ADA",name:"Cardano"},
  {id:"the-open-network",sym:"TON",name:"TON"},
  {id:"chainlink",sym:"LINK",name:"Chainlink"},
  {id:"avalanche-2",sym:"AVAX",name:"Avalanche"},
  {id:"polkadot",sym:"DOT",name:"Polkadot"},
  {id:"near",sym:"NEAR",name:"NEAR"},
  {id:"uniswap",sym:"UNI",name:"Uniswap"},
  {id:"cosmos",sym:"ATOM",name:"Cosmos"},
  {id:"litecoin",sym:"LTC",name:"Litecoin"},
  {id:"tron",sym:"TRX",name:"TRON"},
  {id:"aptos",sym:"APT",name:"Aptos"},
  {id:"arbitrum",sym:"ARB",name:"Arbitrum"},
  {id:"optimism",sym:"OP",name:"Optimism"},
  {id:"injective-protocol",sym:"INJ",name:"Injective"},
];

let results = [];
let currentFilter = 'ALL';
let currentSort = 'score';
let autoInterval = null;
let isAuto = false;
let isScanning = false;

function calcRSI(closes, period=14) {
  if (closes.length < period+1) return 50;
  const r = closes.slice(-(period+1));
  let g=0, l=0;
  for (let i=1;i<r.length;i++) {
    const d = r[i]-r[i-1];
    if (d>0) g+=d; else l+=Math.abs(d);
  }
  const ag=g/period, al=l/period;
  if (al===0) return 100;
  return Math.round(100 - 100/(1+ag/al));
}

function score(data) {
  const {change24h,rsi,maStack,priceVsMAs} = data;
  let ls=0, ss=0, reasons=[];

  if (rsi<=25){ls+=3.5;reasons.push("RSI very oversold");}
  else if(rsi<=35){ls+=2.5;reasons.push("RSI oversold");}
  else if(rsi<=45){ls+=1;reasons.push("RSI low");}
  else if(rsi>=75){ss+=3.5;reasons.push("RSI very overbought");}
  else if(rsi>=65){ss+=2.5;reasons.push("RSI overbought");}
  else if(rsi>=55){ss+=1;reasons.push("RSI high");}

  if(maStack==="bullish"){ls+=2;reasons.push("MAs bullish");}
  else if(maStack==="bearish"){ss+=2;reasons.push("MAs bearish");}
  else reasons.push("MAs flat");

  if(priceVsMAs==="above"){ls+=1.5;reasons.push("Above MAs");}
  else if(priceVsMAs==="below"){ss+=1.5;reasons.push("Below MAs");}

  if(change24h<=-5){ls+=2;reasons.push("Big drop today");}
  else if(change24h<=-3){ls+=1;reasons.push("Down on day");}
  else if(change24h>=8){ss+=2;reasons.push("Big pump today");}
  else if(change24h>=5){ss+=1;reasons.push("Up on day");}

  const max=9;
  if(ls>ss) return {score:Math.min(Math.round((ls/max)*10),10),bias:"LONG",reasons};
  if(ss>ls) return {score:Math.min(Math.round((ss/max)*10),10),bias:"SHORT",reasons};
  return {score:Math.round(ls),bias:"NEUTRAL",reasons};
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressBar').classList.toggle('visible', pct>0 && pct<100);
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠️ '+msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}

async function runScan() {
  if (isScanning) return;
  isScanning = true;
  hideError();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('scanBtn').textContent = '0%';
  document.getElementById('scanBtn').style.opacity = '0.5';
  setProgress(5);

  try {
    // Fetch market data
    const ids = COINS.map(c=>c.id).join(',');
    const mRes = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=false&price_change_percentage=24h`);
    
    if (!mRes.ok) throw new Error('Rate limited');
    const markets = await mRes.json();
    if (!Array.isArray(markets)||markets.length===0) throw new Error('No data returned. Rate limited — wait 60 seconds.');
    
    setProgress(25);
    document.getElementById('scanBtn').textContent = '25%';

    const processed = [];

    for (let i=0;i<COINS.length;i++) {
      const coin = COINS[i];
      const market = markets.find(m=>m.id===coin.id);
      if (!market) continue;

      try {
        const oRes = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}/ohlc?vs_currency=usd&days=14`);
        const ohlc = await oRes.json();
        
        const price = market.current_price;
        const change24h = market.price_change_percentage_24h||0;

        let ma5,ma10,ma20,maStack,priceVsMAs,rsi;

        if (Array.isArray(ohlc)&&ohlc.length>=20) {
          const closes = ohlc.map(c=>c[4]);
          ma5 = closes.slice(-5).reduce((a,b)=>a+b,0)/5;
          ma10 = closes.slice(-10).reduce((a,b)=>a+b,0)/10;
          ma20 = closes.slice(-20).reduce((a,b)=>a+b,0)/20;
          maStack = ma5>ma10&&ma10>ma20?"bullish":ma5<ma10&&ma10<ma20?"bearish":"neutral";
          priceVsMAs = price>ma5&&price>ma10&&price>ma20?"above":price<ma5&&price<ma10&&price<ma20?"below":"neutral";
          rsi = calcRSI(closes);
        } else {
          maStack="neutral"; priceVsMAs="neutral"; rsi=50;
        }

        const s = score({change24h,rsi,maStack,priceVsMAs});
        processed.push({...coin,price,change24h,rsi,maStack,priceVsMAs,...s});
      } catch(e) {
        // skip coin
      }

      const pct = 25+Math.round(((i+1)/COINS.length)*70);
      setProgress(pct);
      document.getElementById('scanBtn').textContent = pct+'%';
      await new Promise(r=>setTimeout(r,250));
    }

    processed.sort((a,b)=>b.score-a.score);
    results = processed;
    
    const now = new Date().toLocaleTimeString('en-AU',{hour12:false});
    document.getElementById('subtitle').textContent = `LAST SCAN: ${now}`;
    
    updateStats();
    renderList();
    setProgress(100);
    setTimeout(()=>setProgress(0),500);

  } catch(e) {
    showError(e.message||'Scan failed. Check connection and try again.');
    setProgress(0);
  }

  document.getElementById('scanBtn').textContent = '⟳ SCAN';
  document.getElementById('scanBtn').style.opacity = '1';
  isScanning = false;
}

function updateStats() {
  const longs = results.filter(c=>c.bias==='LONG').length;
  const shorts = results.filter(c=>c.bias==='SHORT').length;
  const neutrals = results.filter(c=>c.bias==='NEUTRAL').length;
  const top = results[0];
  const total = results.length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statLong').textContent = longs;
  document.getElementById('statShort').textContent = shorts;
  document.getElementById('statTop').textContent = top?`${top.sym} ${top.score}/10`:'—';

  document.getElementById('statsGrid').style.display = 'grid';
  document.getElementById('sentimentWrap').style.display = 'block';

  document.getElementById('sentLong').style.flex = longs;
  document.getElementById('sentNeutral').style.flex = neutrals;
  document.getElementById('sentShort').style.flex = shorts;
  document.getElementById('sentLongPct').textContent = `▲ ${Math.round((longs/total)*100)}% LONG`;
  document.getElementById('sentShortPct').textContent = `▼ ${Math.round((shorts/total)*100)}% SHORT`;
}

function scoreColor(s) {
  return s>=7?'var(--green)':s>=5?'var(--yellow)':'var(--red)';
}

function rsiColor(r) {
  return r>=70?'var(--red)':r<=30?'var(--green)':r>=60?'var(--yellow)':r<=40?'var(--blue)':'var(--text)';
}

function dec(p) {
  return p>=1000?0:p>=1?3:4;
}

function renderList() {
  let list = [...results].filter(c=>currentFilter==='ALL'||c.bias===currentFilter);
  
  list.sort((a,b)=>{
    if(currentSort==='score') return b.score-a.score;
    if(currentSort==='rsi_low') return a.rsi-b.rsi;
    if(currentSort==='rsi_high') return b.rsi-a.rsi;
    if(currentSort==='drop') return a.change24h-b.change24h;
    if(currentSort==='pump') return b.change24h-a.change24h;
    return 0;
  });

  const container = document.getElementById('coinsList');
  
  if (list.length===0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim);font-size:11px;letter-spacing:2px;">NO COINS MATCH FILTER</div>';
    return;
  }

  container.innerHTML = list.map(coin=>{
    const biasClass = coin.bias==='LONG'?'bias-long':coin.bias==='SHORT'?'bias-short':'bias-neutral';
    const biasText = coin.bias==='LONG'?'▲ LONG':coin.bias==='SHORT'?'▼ SHORT':'— SKIP';
    const cardClass = coin.score>=7?(coin.bias==='LONG'?'high-long':coin.bias==='SHORT'?'high-short':''):'';
    const maText = coin.maStack==='bullish'?'▲ BULL':coin.maStack==='bearish'?'▼ BEAR':'~ FLAT';
    const maColor = coin.maStack==='bullish'?'var(--green)':coin.maStack==='bearish'?'var(--red)':'var(--yellow)';

    return `
      <div class="coin-card ${cardClass}">
        <div class="card-top">
          <div class="coin-name-wrap">
            <div class="coin-name">${coin.name}</div>
            <div class="coin-sym">${coin.sym}</div>
          </div>
          <div class="card-right">
            <div class="score-val" style="color:${scoreColor(coin.score)}">${coin.score}/10</div>
            <div class="bias-badge ${biasClass}">${biasText}</div>
          </div>
        </div>
        <div class="card-stats">
          <div>
            <div class="stat-mini-label">PRICE</div>
            <div class="stat-mini-val">$${coin.price?.toFixed(dec(coin.price))}</div>
          </div>
          <div>
            <div class="stat-mini-label">24H</div>
            <div class="stat-mini-val" style="color:${coin.change24h>=0?'var(--green)':'var(--red)'}">${coin.change24h>=0?'+':''}${coin.change24h?.toFixed(2)}%</div>
          </div>
          <div>
            <div class="stat-mini-label">RSI</div>
            <div class="stat-mini-val" style="color:${rsiColor(coin.rsi)}">${coin.rsi}</div>
          </div>
          <div>
            <div class="stat-mini-label">MAs</div>
            <div class="stat-mini-val" style="color:${maColor};font-size:11px">${maText}</div>
          </div>
        </div>
        ${coin.reasons?.length>0?`
        <div class="reasons">
          ${coin.reasons.map(r=>`<div class="reason-tag">${r}</div>`).join('')}
        </div>`:''}
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${coin.score*10}%;background:${scoreColor(coin.score)}"></div>
        </div>
      </div>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  ['All','Long','Short','Neutral'].forEach(x=>{
    const el = document.getElementById('f'+x);
    el.className = 'filter-btn';
  });
  const map = {ALL:'active-all',LONG:'active-long',SHORT:'active-short',NEUTRAL:'active-neutral'};
  document.getElementById('f'+f[0]+f.slice(1).toLowerCase()).className = `filter-btn ${map[f]}`;
  if (results.length>0) renderList();
}

function setSort(s) {
  currentSort = s;
  ['Score','RsiLow','RsiHigh','Drop','Pump'].forEach(x=>{
    document.getElementById('s'+x).className = 'sort-btn';
  });
  const map = {score:'Score',rsi_low:'RsiLow',rsi_high:'RsiHigh',drop:'Drop',pump:'Pump'};
  document.getElementById('s'+map[s]).className = 'sort-btn active';
  if (results.length>0) renderList();
}

function toggleAuto() {
  isAuto = !isAuto;
  const btn = document.getElementById('autoBtn');
  if (isAuto) {
    btn.textContent = '● AUTO';
    btn.classList.add('active');
    autoInterval = setInterval(runScan, 120000);
  } else {
    btn.textContent = '○ AUTO';
    btn.classList.remove('active');
    clearInterval(autoInterval);
  }
}

// Show empty state on load
document.getElementById('emptyState').style.display = 'block';
</script>
</body>
</html>
